<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SudoSLVRR – Main Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Dark theme (default) */
      --bg: #1a1b26;
      --surface: #24283b;
      --text: #c0caf5;
      --accent: #7aa2f7;
      --border: #3b4261;
    }
    :root[data-theme="light"] {
      /* Light theme */
      --bg: #f5f7ff;
      --surface: #ffffff;
      --text: #1f2335;
      --accent: #3366ff;
      --border: #c5cee0;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #2F1F45;
      background-image: url("{{ url_for('static', filename='SudoSLVRR-BG.png') }}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: var(--text);
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }
    .menu-wrapper {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
      padding-top: 55vh;
      width: 100%;
    }
    .menu-btn {
      display: block;
      text-decoration: none;
      text-align: center;
      font-family: 'Jua', sans-serif;
      font-weight: 400;
      width: 300px;
      padding: 18px 0;
      font-size: 26px;
      color: #FFFFFF;
      background-color: #cd9eff;
      border-radius: 50px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0px 5px 0px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.2s ease, box-shadow 0.1s ease;
    }
    .menu-btn:hover {
      background-color: #462e67;
      transform: translateY(-2px);
      box-shadow: 0px 7px 10px rgba(0, 0, 0, 0.3);
    }
    .menu-btn:active {
      transform: translateY(2px);
      box-shadow: 0px 2px 0px rgba(0, 0, 0, 0.2);
    }
    button.menu-btn {
      font-weight: 400;
      letter-spacing: normal;
      -webkit-appearance: none;
      appearance: none;
    }
    a.menu-btn { font-weight: 400; }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    .theme-toggle:hover {
      filter: brightness(1.1);
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 15px; /* Restores the space between your buttons */
      align-items: center;
    }
  </style>
</head>
<body>
  <button type="button" id="themeToggle" class="theme-toggle">Light theme</button>
  <div class="menu-wrapper">
    <nav>
      <a href="{{ url_for('play_page') }}" class="menu-btn">Play Game</a>
      <a href="{{ url_for('create_page') }}" class="menu-btn">Create Puzzle</a>
      <button type="button" class="menu-btn" id="uploadBtn">Upload Puzzle</button>
      <input type="file" id="uploadInput" accept=".txt" style="display: none;">
      <a href="{{ url_for('about_page') }}" class="menu-btn">About Game</a>
    </nav>
  </div>
  <script>
    const THEME_KEY = 'sudoslvrrTheme';

    function applyTheme(theme) {
      if (theme !== 'light' && theme !== 'dark') theme = 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      const btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = theme === 'dark' ? 'Light theme' : 'Dark theme';
    }

    function initThemeToggle() {
      const stored = localStorage.getItem(THEME_KEY) || 'dark';
      applyTheme(stored);
      const btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        const next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem(THEME_KEY, next);
        applyTheme(next);
      });
    }

    initThemeToggle();

    document.getElementById('uploadBtn').addEventListener('click', function() {
      document.getElementById('uploadInput').click();
    });
    document.getElementById('uploadInput').addEventListener('change', function(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function() {
        try {
          const text = reader.result;
          const lines = text.split(/\r?\n/).map(function(l) { return l.trim(); }).filter(function(l) { return l.length; });
          if (lines.length < 2) throw new Error('Invalid instance file: need at least order and idum line');
          const order = parseInt(lines[0], 10);
          if (![3, 4, 5].includes(order)) throw new Error('Unsupported order; use 3, 4, or 5');
          const numCells = Math.pow(order, 4);
          const values = [];
          for (let i = 2; i < lines.length; i++) {
            const parts = lines[i].split(/\s+/);
            for (let j = 0; j < parts.length; j++) {
              const n = parseInt(parts[j], 10);
              if (!Number.isNaN(n)) values.push(n);
            }
          }
          if (values.length < numCells) throw new Error('Instance has too few values');
          const slice = values.slice(0, numCells);
          const out = [];
          for (let k = 0; k < slice.length; k++) {
            const v = slice[k];
            if (v === -1) { out.push('.'); continue; }
            if (order === 3) {
              out.push((v >= 1 && v <= 9) ? String.fromCharCode(48 + v) : '.');
            } else if (order === 4) {
              if (v >= 1 && v <= 10) out.push(String.fromCharCode(48 + v - 1));
              else if (v >= 11 && v <= 16) out.push(String.fromCharCode(97 + v - 11));
              else out.push('.');
            } else {
              out.push((v >= 1 && v <= 25) ? String.fromCharCode(97 + v - 1) : '.');
            }
          }
          const puzzle = out.join('');
          sessionStorage.setItem('createdPuzzle', JSON.stringify({ order: order, puzzle: puzzle, name: file.name }));
          window.location.href = '{{ url_for("play_page") }}';
        } catch (err) {
          alert(err.message || 'Failed to parse puzzle file.');
        }
        e.target.value = '';
      };
      reader.onerror = function() { alert('Could not read file.'); e.target.value = ''; };
      reader.readAsText(file, 'utf-8');
    });
  </script>
</body>
</html>
