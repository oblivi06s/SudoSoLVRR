<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SudoPHASE – Main Menu</title>
  <style>
    :root {
      /* Dark theme (default) */
      --bg: #1a1b26;
      --surface: #24283b;
      --text: #c0caf5;
      --accent: #7aa2f7;
      --border: #3b4261;
    }
    :root[data-theme="light"] {
      /* Light theme */
      --bg: #f5f7ff;
      --surface: #ffffff;
      --text: #1f2335;
      --accent: #3366ff;
      --border: #c5cee0;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      background-image: url("{{ url_for('static', filename='SudoPHASE-BG.png') }}");
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center center;
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(6rem, 18vw, 10rem) max(1rem, env(safe-area-inset-right)) 2rem max(1rem, env(safe-area-inset-left));
      padding-top: max(clamp(5rem, 16vw, 10rem), env(safe-area-inset-top));
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
    }
    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0rem;
      width: 100%;
      max-width: min(360px, calc(100vw - 2rem));
      padding: 0 0.5rem;
    }
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .logo-wrap img {
      width: min(400px, 72vw);
      height: auto;
      max-height: min(400px, 38vh);
      object-fit: contain;
      display: block;
    }
    .logo-svg {
      width: 260px;
      height: 260px;
    }
    .btn-menu {
      width: 100%;
      padding: 0.75rem 1rem;
      min-height: 48px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--bg);
      background: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: block;
      transition: filter 0.15s;
    }
    .btn-menu:hover { filter: brightness(1.15); }
    .btn-menu:active { filter: brightness(0.95); }
    button.btn-menu {
      font-family: inherit;
      font-size: inherit;
      font-weight: 600;
      letter-spacing: normal;
      -webkit-appearance: none;
      appearance: none;
    }
    a.btn-menu { font-weight: 600; }
    .buttons { width: 100%; display: flex; flex-direction: column; gap: 0.5rem; }

    button.btn-menu, a.btn-menu { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

    .theme-toggle {
      position: fixed;
      top: max(1rem, env(safe-area-inset-top));
      right: max(1rem, env(safe-area-inset-right));
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    .theme-toggle:hover {
      filter: brightness(1.1);
    }

    @media (max-width: 480px) {
      body {
        padding-top: max(4.5rem, env(safe-area-inset-top));
        padding-left: max(0.75rem, env(safe-area-inset-left));
        padding-right: max(0.75rem, env(safe-area-inset-right));
      }
      .logo-svg {
        width: min(260px, 55vw);
        height: auto;
      }
    }
  </style>
</head>
<body>
  <button type="button" id="themeToggle" class="theme-toggle">Light theme</button>
  <div class="menu">
    <div class="logo-wrap">
      <img src="{{ url_for('logo') }}" alt="SudoPHASE" id="logoImg" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
      <svg class="logo-svg" id="logoFallback" style="display:none;" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" fill="url(#g)" stroke="#7aa2f7" stroke-width="2"/>
        <path d="M22 22h16v16H22zM62 22h16v16H62zM42 42h16v16H42z" stroke="#c0caf5" stroke-width="1.5" fill="none"/>
        <text x="28" y="32" fill="#c0caf5" font-size="10" font-weight="bold">3</text>
        <text x="68" y="32" fill="#c0caf5" font-size="10" font-weight="bold">5</text>
        <text x="48" y="52" fill="#c0caf5" font-size="10" font-weight="bold">7</text>
        <path d="M18 18 L82 82" stroke="#7aa2f7" stroke-width="6" stroke-linecap="round"/>
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#24283b"/><stop offset="1" stop-color="#1a1b26"/></linearGradient></defs>
      </svg>
    </div>
    <nav class="buttons">
      <a href="{{ url_for('play_page') }}" class="btn-menu">Play</a>
      <a href="{{ url_for('create_page') }}" class="btn-menu">Create Puzzle</a>
      <button type="button" class="btn-menu" id="uploadBtn">Upload Puzzle</button>
      <input type="file" id="uploadInput" accept=".txt" style="display: none;">
      <a href="{{ url_for('about_page') }}" class="btn-menu">About Game</a>
    </nav>
  </div>
  <script>
    const THEME_KEY = 'sudophaseTheme';

    function applyTheme(theme) {
      if (theme !== 'light' && theme !== 'dark') theme = 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      const btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = theme === 'dark' ? 'Light theme' : 'Dark theme';
    }

    function initThemeToggle() {
      const stored = localStorage.getItem(THEME_KEY) || 'dark';
      applyTheme(stored);
      const btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        const next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem(THEME_KEY, next);
        applyTheme(next);
      });
    }

    initThemeToggle();

    document.getElementById('uploadBtn').addEventListener('click', function() {
      document.getElementById('uploadInput').click();
    });
    document.getElementById('uploadInput').addEventListener('change', function(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function() {
        try {
          const text = reader.result;
          const lines = text.split(/\r?\n/).map(function(l) { return l.trim(); }).filter(function(l) { return l.length; });
          if (lines.length < 2) throw new Error('Invalid instance file: need at least order and idum line');
          const order = parseInt(lines[0], 10);
          if (![3, 4, 5].includes(order)) throw new Error('Unsupported order; use 3, 4, or 5');
          const numCells = Math.pow(order, 4);
          const values = [];
          for (let i = 2; i < lines.length; i++) {
            const parts = lines[i].split(/\s+/);
            for (let j = 0; j < parts.length; j++) {
              const n = parseInt(parts[j], 10);
              if (!Number.isNaN(n)) values.push(n);
            }
          }
          if (values.length < numCells) throw new Error('Instance has too few values');
          const slice = values.slice(0, numCells);
          const out = [];
          for (let k = 0; k < slice.length; k++) {
            const v = slice[k];
            if (v === -1) { out.push('.'); continue; }
            if (order === 3) {
              out.push((v >= 1 && v <= 9) ? String.fromCharCode(48 + v) : '.');
            } else if (order === 4) {
              if (v >= 1 && v <= 10) out.push(String.fromCharCode(48 + v - 1));
              else if (v >= 11 && v <= 16) out.push(String.fromCharCode(97 + v - 11));
              else out.push('.');
            } else {
              out.push((v >= 1 && v <= 25) ? String.fromCharCode(97 + v - 1) : '.');
            }
          }
          const puzzle = out.join('');
          sessionStorage.setItem('createdPuzzle', JSON.stringify({ order: order, puzzle: puzzle, name: file.name }));
          window.location.href = '{{ url_for("play_page") }}';
        } catch (err) {
          alert(err.message || 'Failed to parse puzzle file.');
        }
        e.target.value = '';
      };
      reader.onerror = function() { alert('Could not read file.'); e.target.value = ''; };
      reader.readAsText(file, 'utf-8');
    });
  </script>
</body>
</html>
