<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SudoPHASE</title>
  <style>
    :root {
      /* Dark theme (default) */
      --bg: #1a1b26;
      --surface: #24283b;
      --text: #c0caf5;
      --accent: #7aa2f7;
      --success: #9ece6a;
      --border: #3b4261;
      --cell-border: #414868;
      --block-border: #7aa2f7;
    }
    :root[data-theme="light"] {
      /* Light theme */
      --bg: #F7F9FC;
      --surface: #ffffff;
      --text: #1f2335;
      --accent: #3366ff;
      --success: #2e7d32;
      --border: #c5cee0;
      --cell-border: #d0d7ea;
      --block-border: #363942;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: row;
      padding: 1rem;
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
      gap: 1rem;
    }
    button, a, input, select, summary, .library-list li { touch-action: manipulation; }
    .library-panel {
      flex-shrink: 0;
      width: 260px;
      padding: 0.75rem;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .library-panel h2 { font-size: 1rem; margin: 0 0 0.25rem 0; color: var(--accent); }
    .library-panel label { font-size: 0.85rem; }
    .library-panel select { width: 100%; padding: 0.35rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; }
    /* ~5 instance rows visible; scroll for the rest */
    .library-list {
      flex: 0 0 auto;
      --library-row: 1.55rem;
      max-height: calc(5 * var(--library-row) + 0.5rem);
      min-height: 2rem;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      list-style: none;
      margin: 0;
      padding: 0.25rem;
      font-size: 0.8rem;
    }
    .library-list li {
      min-height: var(--library-row);
      box-sizing: border-box;
      display: flex;
      align-items: center;
      padding: 0.2rem 0.4rem;
      cursor: pointer;
      border-radius: 3px;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .library-list li:hover { background: var(--surface); }
    .library-list li.selected { background: var(--accent); color: var(--bg); }
    .params-container { margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 0.5rem; }
    .params-header { font-size: 1rem; margin: 0 0 0.25rem 0; color: var(--accent); }
    .params-container label { font-size: 0.85rem; }
    .params-container input[type="number"] { width: 4rem; padding: 0.35rem; margin-left: 0.25rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; }
    .param-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.35rem;
    }
    .param-row .param-lhs { flex: 1; min-width: 0; line-height: 1.25; }
    .param-row .param-symbol { font-weight: 600; color: var(--accent); font-size: 0.88rem; }
    .param-row .param-desc {
      display: block;
      margin-top: 0.12rem;
      font-size: 0.72rem;
      opacity: 0.88;
      font-weight: 400;
      word-break: break-word;
    }
    .param-row .param-desc sub { font-size: 0.75em; }
    .param-row input[type="number"] {
      flex-shrink: 0;
      width: 4.5rem;
      margin-top: 0.12rem;
      margin-left: 0;
      text-align: right;
    }
    .params-container .btn-solve { width: 100%; margin-top: 0.5rem; padding: 0.5rem 1rem; }
    .main-area { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 0; position: relative; width: 100%; }
    .back-link {
      position: absolute;
      top: max(0.5rem, env(safe-area-inset-top));
      left: max(0.5rem, env(safe-area-inset-left));
      color: var(--accent);
      font-size: 0.9rem;
      text-decoration: none;
      padding: 0.5rem 0.35rem;
      min-height: 44px;
      min-width: 44px;
      display: inline-flex;
      align-items: center;
      z-index: 5;
      -webkit-tap-highlight-color: transparent;
    }
    .back-link:active { opacity: 0.85; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; color: var(--accent); }
    .subtitle { font-size: 0.85rem; opacity: 0.8; margin-bottom: 0.75rem; }
    .grid-wrap {
      padding: 0.5rem;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      max-width: 100%;
      overflow: auto; /* allow scrolling on small screens (e.g. 25×25) */
    }
    .pad-wrap { margin-top: 1rem; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; max-width: 340px; }
    .action-buttons { display: flex; gap: 1rem; justify-content: center; }
    .action-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.35rem;
      padding: 0.6rem 1.25rem; border-radius: 12px; background: transparent;
      border: 1px solid rgba(192, 202, 245, 0.5); color: var(--text);
      font-size: 0.85rem; font-weight: 600; cursor: pointer; min-width: 5rem;
    }
    .action-btn:hover { border-color: var(--accent); background: rgba(122, 162, 247, 0.1); }
    .action-btn .action-btn-icon { width: 1.5rem; height: 1.5rem; display: block; }
    .digit-rows { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
    .digit-row {
      display: flex; flex-wrap: nowrap; justify-content: center; align-items: center; gap: 0.4rem;
    }
    .digit-btn {
      width: 2.5rem; height: 2.5rem; padding: 0; aspect-ratio: 1;
      border-radius: 8px; background: transparent;
      border: 1px solid rgba(192, 202, 245, 0.5); color: var(--text);
      font-weight: 600; font-size: 1rem; cursor: pointer; flex-shrink: 0;
    }
    .digit-btn:hover { border-color: var(--accent); background: rgba(122, 162, 247, 0.1); }
    .sudoku-grid input.selected-cell {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .sudoku-grid {
      display: grid;
      gap: 0;
      border: 4px solid var(--block-border);
    }
    .sudoku-grid input {
      border: 1px solid var(--cell-border);
      background: var(--bg);
      color: var(--text);
      font-size: 1.1rem;
      text-align: center;
      padding: 0;
    }
    .sudoku-grid input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
    .sudoku-grid input.fixed { font-weight: bold; color: var(--accent); background: var(--surface); }
    .sudoku-grid input.filled { color: var(--success); background: var(--surface); }
    /* In light theme:
       - cell background: #ffffff
       - fixed clues: digit color #1e2022
       - user-filled: digit color #6484c1
       Peer / selected override below. */
    :root[data-theme="light"] .sudoku-grid input {
      background: #ffffff;
    }
    :root[data-theme="light"] .sudoku-grid input.fixed {
      background: #ffffff;
      color: #1e2022;
    }
    :root[data-theme="light"] .sudoku-grid input.filled {
      background: #ffffff;
      color: #6484c1;
    }
    /* Base peer highlighting (dark theme + fallback) */
    .sudoku-grid input.peer-highlight {
      background: rgba(255, 255, 255, 0.12);
    }
    .sudoku-grid input.peer-highlight.fixed,
    .sudoku-grid input.peer-highlight.filled {
      background: rgba(255, 255, 255, 0.18);
    }
    /* Peer highlight and selected cell (light theme) */
    :root[data-theme="light"] .sudoku-grid input.peer-highlight {
      background: #e3ecf3;
    }
    :root[data-theme="light"] .sudoku-grid input.peer-highlight.fixed,
    :root[data-theme="light"] .sudoku-grid input.peer-highlight.filled {
      background: #e3ecf3;
    }
    :root[data-theme="light"] .sudoku-grid input.selected-cell,
    :root[data-theme="light"] .sudoku-grid input.selected-cell:focus {
      background: #b1defd;
    }
    /* Conflicted cells stay red and override any peer/background coloring */
    .sudoku-grid input.conflict,
    .sudoku-grid input.peer-highlight.conflict {
      background: #ff4d4f;
      color: #ffffff;
    }
    /* In light theme, explicitly override high-specificity peer rules for conflicts */
    :root[data-theme="light"] .sudoku-grid input.conflict,
    :root[data-theme="light"] .sudoku-grid input.peer-highlight.conflict {
      background: #ff4d4f;
      color: #ffffff;
    }
    /* Block boundaries: thicker, different color (3×3, 4×4, or 5×5 sub-grids) */
    .sudoku-grid input.block-right { border-right-width: 3px; border-right-color: var(--block-border); }
    .sudoku-grid input.block-bottom { border-bottom-width: 3px; border-bottom-color: var(--block-border); }
    .controls { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; justify-content: center; }
    .controls label { font-size: 0.9rem; }
    .controls input[type="number"] { width: 4rem; padding: 0.35rem; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 4px; }
    button { padding: 0.5rem 1.25rem; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.95rem; }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .result { margin-top: 1rem; padding: 1rem; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); min-width: 280px; max-width: 100%; }
    .result.error { border-color: #f7768e; }
    .result .time { color: var(--success); font-weight: 600; }
    .result .meta { font-size: 0.85rem; opacity: 0.9; margin-top: 0.5rem; }
    .loading { opacity: 0.7; }

    .cell-tooltip {
      position: fixed;
      z-index: 20;
      padding: 0.55rem 1.1rem;
      border-radius: 999px;
      background: #ffffff;
      color: #111827;
      font-size: 0.9rem;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -135%);
      transition: opacity 0.15s ease;
      white-space: nowrap;
    }
    .cell-tooltip.visible {
      opacity: 1;
    }
    .cell-tooltip::after {
      content: "";
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px 6px 0 6px;
      border-style: solid;
      border-color: #ffffff transparent transparent transparent;
    }
    /* In light theme, keep tooltip in accent color to stand out on white UI */
    :root[data-theme="light"] .cell-tooltip {
      background: var(--accent);
      color: var(--bg);
    }
    :root[data-theme="light"] .cell-tooltip::after {
      border-color: var(--accent) transparent transparent transparent;
    }

    .theme-toggle {
      position: fixed;
      top: max(0.75rem, env(safe-area-inset-top));
      right: max(0.75rem, env(safe-area-inset-right));
      padding: 0.4rem 0.95rem;
      min-height: 40px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      backdrop-filter: blur(6px);
      z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-toggle:hover { filter: brightness(1.1); }

    /* Collapsible library + parameters on small screens */
    .side-panel-details { border: none; }
    .side-panel-details > summary {
      list-style: none;
      cursor: pointer;
      display: none;
    }
    .side-panel-details > summary::-webkit-details-marker { display: none; }
    .side-panel-inner {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* ===== Responsive layout for tablets & phones ===== */
    @media (max-width: 900px) {
      body {
        flex-direction: column;
        padding: max(0.5rem, env(safe-area-inset-top)) max(0.5rem, env(safe-area-inset-right)) max(0.5rem, env(safe-area-inset-bottom)) max(0.5rem, env(safe-area-inset-left));
        align-items: stretch;
        gap: 0.65rem;
      }

      .library-panel {
        width: 100%;
        max-width: 640px;
        margin: 0 auto;
        order: 2;
        padding: 0.5rem 0.65rem;
      }

      .side-panel-details > summary.side-panel-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        padding: 0.65rem 0.85rem;
        margin-bottom: 0.35rem;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--accent);
        min-height: 48px;
      }
      .side-panel-details > summary.side-panel-summary::after {
        content: '▾';
        font-size: 0.75rem;
        opacity: 0.85;
        transition: transform 0.2s ease;
      }
      .side-panel-details[open] > summary.side-panel-summary::after {
        transform: rotate(-180deg);
      }

      .main-area {
        width: 100%;
        order: 1;
        padding-top: 2.85rem;
        padding-left: 0;
        padding-right: 0;
      }

      .main-area h1 { margin-top: 0.15rem; }

      .grid-wrap {
        max-width: min(calc(100vw - 1.25rem), 100%);
        width: 100%;
        justify-self: center;
      }

      .pad-wrap {
        width: 100%;
        max-width: min(100%, 420px);
        padding: 0 0.25rem;
      }

      .digit-row {
        flex-wrap: wrap;
        justify-content: center;
      }

      .digit-btn {
        width: 2.65rem;
        height: 2.65rem;
        min-width: 2.65rem;
        min-height: 2.65rem;
      }

      .library-list li {
        min-height: 44px;
      }

      .library-panel #loadBtn,
      .params-container .btn-solve {
        min-height: 48px;
        font-size: 1rem;
      }

      .params-container label,
      .library-panel label {
        font-size: 0.9rem;
      }

      #algSelect {
        max-width: 100% !important;
      }

      .alg-select-row {
        flex-wrap: wrap;
      }

      .param-row input[type="number"],
      .params-container input[type="number"] {
        min-height: 40px;
        padding: 0.45rem 0.35rem;
      }

      .theme-toggle {
        top: max(0.45rem, env(safe-area-inset-top));
        right: max(0.45rem, env(safe-area-inset-right));
      }
    }

    @media (min-width: 901px) {
      .side-panel-details > summary.side-panel-summary { display: none; }
    }

    /* Extra-small phones */
    @media (max-width: 480px) {
      body {
        padding: max(0.35rem, env(safe-area-inset-top)) max(0.35rem, env(safe-area-inset-right)) max(0.35rem, env(safe-area-inset-bottom)) max(0.35rem, env(safe-area-inset-left));
      }

      h1 {
        font-size: 1.15rem;
      }

      .subtitle {
        font-size: 0.8rem;
        text-align: center;
        padding: 0 0.5rem;
      }

      .library-panel {
        padding: 0.45rem 0.5rem;
      }

      .action-btn {
        padding: 0.55rem 0.85rem;
        min-width: 0;
        min-height: 44px;
      }

      button {
        font-size: 0.9rem;
      }

      .controls button {
        min-height: 44px;
        padding: 0.55rem 1.1rem;
      }

      .result {
        min-width: 0;
        width: 100%;
        padding: 0.85rem;
      }

      .param-row .param-desc { font-size: 0.68rem; }
    }

    /* Short landscape phones */
    @media (max-width: 900px) and (max-height: 500px) {
      .main-area { padding-top: 2.25rem; }
      .subtitle { margin-bottom: 0.35rem; }
    }
  </style>
</head>
<body>
  <button type="button" id="themeToggle" class="theme-toggle">Light theme</button>
  <aside class="library-panel">
    <details class="side-panel-details" id="sidePanelDetails" open>
      <summary class="side-panel-summary">Library &amp; solver settings</summary>
      <div class="side-panel-inner">
    <h2>Puzzle library</h2>
    <label>Size:</label>
    <select id="sizeSelect">
      <option value="9×9">9×9</option>
      <option value="16×16">16×16</option>
      <option value="25×25">25×25</option>
    </select>
    <label>Instances <span style="font-weight:400;opacity:0.75;font-size:0.75rem;">(scroll for more)</span></label>
    <ul class="library-list" id="libraryList" role="listbox" aria-label="Puzzle instances"></ul>
    <button type="button" id="loadBtn">Load selected</button>
    <div class="params-container" style="overflow-y:auto; padding-right:0.25rem;">
      <h2 class="params-header" style="font-size: 1.1rem; margin-bottom: 0.5rem;">Parameters</h2>
      <h2 class="params-header">General</h2>
      <label class="alg-select-row" style="display:flex; justify-content:space-between; align-items:center; gap:0.35rem;">Algorithm:
        <select id="algSelect" style="flex:1; max-width:11rem; min-width:0; padding:0.35rem; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:4px; font-size:0.8rem;">
          <option value="0">0 — Single-thread ACS</option>
          <option value="3">3 — Multi-colony</option>
          <option value="4" selected>4 — Multi-thread multi-colony</option>
        </select>
      </label>
      <label style="display:flex; justify-content:space-between; align-items:center;">Timeout (s): <input type="number" id="timeout" value="5" min="5" max="600" style="width: 4.5rem; text-align:right;"></label>

      <h2 class="params-header" style="margin-top:0.5rem; font-size:0.95rem;">Ant colony</h2>
      <label style="display:flex; justify-content:space-between; align-items:center;">Ants: <input type="number" id="ants" value="3" min="1" style="width: 4.5rem; text-align:right;"></label>
      <label class="param-row" title="Greediness (maps to --q0)">
        <span class="param-lhs">
          <span class="param-symbol">q<sub>0</sub></span>
          <span class="param-desc">Greediness</span>
        </span>
        <input type="number" id="q0" value="0.9" min="0" max="1" step="0.01">
      </label>
      <label class="param-row" title="Pheromone persistence (maps to --rho)">
        <span class="param-lhs">
          <span class="param-symbol">ρ</span>
          <span class="param-desc">Pheromone Persistence</span>
        </span>
        <input type="number" id="rho" value="0.9" min="0" max="1" step="0.01">
      </label>
      <label class="param-row" title="Local pheromone update (maps to --xi)">
        <span class="param-lhs">
          <span class="param-symbol">ξ</span>
          <span class="param-desc">Local Pheromone Update</span>
        </span>
        <input type="number" id="xi" value="0.1" min="0" max="1" step="0.01">
      </label>
      <label class="param-row" title="Best value evaporation (maps to --evap)">
        <span class="param-lhs">
          <span class="param-symbol">ρ<sub>BVE</sub></span>
          <span class="param-desc">Best Value Evaporation</span>
        </span>
        <input type="number" id="evap" value="0.005" min="0.001" max="0.999" step="0.001">
      </label>

      <h2 class="params-header" style="margin-top:0.5rem; font-size:0.95rem;">Multi-Colony ACO</h2>
      <label style="display:flex; justify-content:space-between; align-items:center;">Numacs: <input type="number" id="numacs" value="2" min="1" style="width: 4.5rem; text-align:right;"></label>
      <label style="display:flex; justify-content:space-between; align-items:center;">Entropythreshold: <input type="number" id="entropythreshold" value="1.47" min="0" step="0.01" style="width: 4.5rem; text-align:right;"></label>
      <label style="display:flex; justify-content:space-between; align-items:center;">Convthreshold: <input type="number" id="convthreshold" value="0.8" min="0" max="1" step="0.01" style="width: 4.5rem; text-align:right;"></label>

      <div id="mtParams">
        <h2 class="params-header" style="margin-top:0.5rem; font-size:0.95rem;">Threads &amp; comm (alg 4)</h2>
        <label style="display:flex; justify-content:space-between; align-items:center;">Threads: <input type="number" id="threads" value="5" min="1" max="32" style="width: 4.5rem; text-align:right;"></label>
        <label style="display:flex; justify-content:space-between; align-items:center;">Comm-threshold: <input type="number" id="commThreshold" value="200" min="1" style="width: 4.5rem; text-align:right;"></label>
        <label style="display:flex; justify-content:space-between; align-items:center;">Comm-early: <input type="number" id="commEarly" value="100" min="1" style="width: 4.5rem; text-align:right;"></label>
        <label style="display:flex; justify-content:space-between; align-items:center;">Comm-late: <input type="number" id="commLate" value="10" min="1" style="width: 4.5rem; text-align:right;"></label>
      </div>

      <button type="button" id="solveBtn" class="btn-solve">SOLVE PUZZLE</button>
    </div>
      </div>
    </details>
  </aside>
  <main class="main-area">
    <a href="/" class="back-link">← Main menu</a>
    <h1>SudoPHASE</h1>
    <p class="subtitle" id="subtitle">Puzzle · 0:00</p>
    <p class="subtitle" id="solverProgress" style="min-height:1.2em;font-size:0.8rem;opacity:0.85;margin-top:-0.35rem;"></p>
    <div class="grid-wrap">
      <div class="sudoku-grid" id="grid"></div>
    </div>
    <div class="pad-wrap" id="numberPad"></div>
    <div class="controls">
      <button type="button" id="clearBtn">Clear</button>
    </div>
    <div class="result" id="result" style="display: none;"></div>
  </main>

  <script>
    const THEME_KEY = 'sudophaseTheme';

    function applyTheme(theme) {
      if (theme !== 'light' && theme !== 'dark') theme = 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      const btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = theme === 'dark' ? 'Light theme' : 'Dark theme';
    }

    function initThemeToggle() {
      const stored = localStorage.getItem(THEME_KEY) || 'dark';
      applyTheme(stored);
      const btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        const next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem(THEME_KEY, next);
        applyTheme(next);
      });
    }

    initThemeToggle();

    const gridEl = document.getElementById('grid');
    const resultEl = document.getElementById('result');
    const solveBtn = document.getElementById('solveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const sizeSelect = document.getElementById('sizeSelect');
    const libraryList = document.getElementById('libraryList');
    const loadBtn = document.getElementById('loadBtn');
    const subtitle = document.getElementById('subtitle');
    const numberPad = document.getElementById('numberPad');
    const algSelect = document.getElementById('algSelect');
    const mtParams = document.getElementById('mtParams');
    const solverProgressEl = document.getElementById('solverProgress');

    function syncMtParamsVisibility() {
      if (!mtParams || !algSelect) return;

    if (algSelect) {

    const SIZES = { '9×9': 3, '16×16': 4, '25×25': 5 };
    /** Default solver timeout (seconds) per grid size in the UI */
    const TIMEOUT_BY_SIZE = { '9×9': 5, '16×16': 20, '25×25': 120 };
    const CELLS = { 3: 81, 4: 256, 5: 625 };
    const MAX_VAL = { 3: 9, 4: 16, 5: 25 };

    function applyTimeoutForSizeLabel(sizeLabel) {
      const el = document.getElementById('timeout');
      if (!el || !Object.prototype.hasOwnProperty.call(TIMEOUT_BY_SIZE, sizeLabel)) return;
      el.value = String(TIMEOUT_BY_SIZE[sizeLabel]);
    }

    /** Matches scripts/AblationScript.py: max_entropy then 92.5% rounded to 2 decimals */
    function entropyThresholdFromAnts(numAnts) {
      const n = Math.max(1, parseInt(String(numAnts), 10) || 1);
      const maxEntropy = (-n) * ((1 / n) * Math.log2(1 / n));
      return Math.round(0.925 * maxEntropy * 100) / 100;
    }

    function applyEntropyThresholdFromAnts() {
      const antsEl = document.getElementById('ants');
      const entEl = document.getElementById('entropythreshold');
      if (!antsEl || !entEl) return;
      const n = parseInt(antsEl.value, 10);
      if (!Number.isFinite(n) || n < 1) return;
      entEl.value = String(entropyThresholdFromAnts(n));
    }

    const antsInput = document.getElementById('ants');
    if (antsInput) {
      antsInput.addEventListener('input', applyEntropyThresholdFromAnts);
      antsInput.addEventListener('change', applyEntropyThresholdFromAnts);
    }

    let libraryData = {};
    let currentOrder = 3;
    let currentSizeLabel = '9×9';
    let lastFocusedInput = null;
    let undoStack = [];
    let initialPuzzle = ''; // clues-only puzzle for current grid; used to know which cells are fixed when restoring undo
    let savedCellIndex = null;  // cell index before current input (so we can snapshot state-before-typing)
    let savedCellValue = '';
    let fixedCellTooltipEl = null;
    let fixedCellTooltipTimeout = null;
    let currentPuzzleName = ''; // instance filename or "Default puzzle", "Created puzzle", "Empty grid"
    let userSolveStartTime = null;
    let subtitleTimerId = null;

    function updateUndoButton() {
      const btn = document.getElementById('undoBtn');
      if (!btn) return;
      btn.disabled = undoStack.length === 0;
    }

    function showFixedCellTooltip(cell) {
      if (!cell) return;
      if (!fixedCellTooltipEl) {
        fixedCellTooltipEl = document.createElement('div');
        fixedCellTooltipEl.className = 'cell-tooltip';
        document.body.appendChild(fixedCellTooltipEl);
      }
      fixedCellTooltipEl.textContent = "Can't fill in a pre-filled cell";
      const rect = cell.getBoundingClientRect();
      fixedCellTooltipEl.style.left = (rect.left + rect.width / 2) + 'px';
      fixedCellTooltipEl.style.top = rect.top + 'px';
      fixedCellTooltipEl.classList.add('visible');
      if (fixedCellTooltipTimeout) clearTimeout(fixedCellTooltipTimeout);
      fixedCellTooltipTimeout = setTimeout(() => {
        if (fixedCellTooltipEl) fixedCellTooltipEl.classList.remove('visible');
      }, 1500);
    }

    function startUserSolveTimer() {
      userSolveStartTime = Date.now();
      if (!subtitleTimerId) subtitleTimerId = setInterval(updateSubtitle, 1000);
    }
    function clearUserSolveTimer() {
      userSolveStartTime = null;
      if (subtitleTimerId) { clearInterval(subtitleTimerId); subtitleTimerId = null; }
      updateSubtitle();
    }
    function updateSubtitle() {
      let timerStr = '0:00';
      if (userSolveStartTime != null) {
        const elapsed = Math.floor((Date.now() - userSolveStartTime) / 1000);
        const m = Math.floor(elapsed / 60);
        const s = elapsed % 60;
        timerStr = m + ':' + (s < 10 ? '0' : '') + s;
      }
      const name = currentPuzzleName || 'Puzzle';
      subtitle.textContent = name + ' · ' + timerStr;
    }
    function checkUserCompleted() {
      const inputs = gridEl.querySelectorAll('input');
      if (!inputs.length) return false;
      for (const inp of inputs) {
        if (!inp.value.trim()) return false;
        if (inp.classList.contains('conflict')) return false;
      }
      return true;
    }
    function showUserSolvedMessage(elapsedSec) {
      resultEl.style.display = 'block';
      resultEl.classList.remove('error');
      const mins = Math.floor(elapsedSec / 60);
      const secs = elapsedSec % 60;
      const timeStr = mins > 0 ? mins + ' min ' + secs.toFixed(1) + ' s' : elapsedSec.toFixed(1) + ' s';
      resultEl.innerHTML = '<strong class="time">Puzzle solved!</strong> You completed it in ' + timeStr + '.';
    }

    function snapshotGrid(overrideIndex, overrideDisplayValue) {
      // Save current grid state. If overrideIndex/overrideDisplayValue provided, use that value for that cell (state before typing).
      if (!gridEl.querySelector('input')) return;
      const puzzle = gridToPuzzle(overrideIndex, overrideDisplayValue);
      undoStack.push({ puzzle, order: currentOrder, initialPuzzle });
      if (undoStack.length > 200) undoStack.shift();
      updateUndoButton();
    }

    function restoreLastState() {
      if (!undoStack.length) return;
      const state = undoStack.pop();
      if (!state) return;
      savedCellIndex = null;
      savedCellValue = '';
      if (state.order !== currentOrder) {
        createGrid(state.order);
      }
      initialPuzzle = state.initialPuzzle || '';
      puzzleToGrid(state.puzzle, state.order, initialPuzzle);
      resultEl.style.display = 'none';
      updateSolveButton();
      updateUndoButton();
      startUserSolveTimer();
      updateSubtitle();
    }

    function selectCell(el) {
      const inputs = gridEl.querySelectorAll('input');
      inputs.forEach(inp => inp.classList.remove('peer-highlight'));
      if (lastFocusedInput && lastFocusedInput !== el) {
        lastFocusedInput.classList.remove('selected-cell');
      }
      lastFocusedInput = el;
      if (el) {
        el.classList.add('selected-cell');
        if (el.classList.contains('fixed')) return;
        const i = parseInt(el.dataset.index, 10);
        if (Number.isNaN(i)) return;
        const order = currentOrder;
        const n = order * order;
        const row = Math.floor(i / n);
        const col = i % n;
        const peerIndices = new Set();
        for (let c = 0; c < n; c++) peerIndices.add(row * n + c);
        for (let r = 0; r < n; r++) peerIndices.add(r * n + col);
        const blockRow = Math.floor(row / order);
        const blockCol = Math.floor(col / order);
        const r0 = blockRow * order;
        const c0 = blockCol * order;
        for (let r = r0; r < r0 + order; r++) {
          for (let c = c0; c < c0 + order; c++) {
            peerIndices.add(r * n + c);
          }
        }
        peerIndices.forEach(idx => {
          if (inputs[idx] && inputs[idx] !== el) inputs[idx].classList.add('peer-highlight');
        });
      }
    }

    const UNDO_ICON = '<svg class="action-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10h10a5 5 0 0 1 5 5v2M3 10l4-4M3 10l4 4"/></svg>';
    const ERASE_ICON = '<svg class="action-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7l-4-4 4-4h13a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1z"/><path d="M4 16l4-4"/><path d="M8 12l4 4"/></svg>';

    function renderNumberPad(order) {
      if (!numberPad) return;
      numberPad.innerHTML = '';
      const maxVal = MAX_VAL[order];

      const actionRow = document.createElement('div');
      actionRow.className = 'action-buttons';

      const undoBtn = document.createElement('button');
      undoBtn.type = 'button';
      undoBtn.id = 'undoBtn';
      undoBtn.className = 'action-btn';
      undoBtn.innerHTML = UNDO_ICON + '<span class="action-btn-label">Undo</span>';
      undoBtn.addEventListener('click', () => restoreLastState());
      actionRow.appendChild(undoBtn);

      const eraseBtn = document.createElement('button');
      eraseBtn.type = 'button';
      eraseBtn.className = 'action-btn';
      eraseBtn.innerHTML = ERASE_ICON + '<span class="action-btn-label">Erase</span>';
      eraseBtn.addEventListener('click', () => {
        const target = lastFocusedInput;
        if (!target || target.classList.contains('fixed')) return;
        snapshotGrid();
        target.value = '';
        target.classList.remove('filled');
        updateSolveButton();
        recomputeConflicts();
        checkAndShowUserSolved();
      });
      actionRow.appendChild(eraseBtn);

      numberPad.appendChild(actionRow);

      const digitRows = document.createElement('div');
      digitRows.className = 'digit-rows';

      let rowRanges;
      if (order === 3) rowRanges = [[1, 9]];
      else if (order === 4) rowRanges = [[1, 8], [9, 16]];
      else rowRanges = [[1, 10], [11, 20], [21, 25]];

      for (const [lo, hi] of rowRanges) {
        const digitRow = document.createElement('div');
        digitRow.className = 'digit-row';
        for (let v = lo; v <= hi; v++) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'digit-btn';
          btn.textContent = String(v);
          btn.addEventListener('click', () => {
            let target = lastFocusedInput;
            if (!target) {
              target = gridEl.querySelector('input');
              if (!target) return;
              target.focus();
              selectCell(target);
            }
            if (target.classList.contains('fixed')) {
              showFixedCellTooltip(target);
              return;
            }
            snapshotGrid();
            target.value = String(v);
            target.classList.add('filled');
          updateSolveButton();
          recomputeConflicts();
          checkAndShowUserSolved();
        });
        digitRow.appendChild(btn);
      }
      digitRows.appendChild(digitRow);
    }
      numberPad.appendChild(digitRows);
      updateUndoButton();
    }

    /** Cell size (px) and font scale to fit narrow viewports; wider screens keep comfortable defaults. */
    function getResponsiveGridCellMetrics(order) {
      const n = order * order;
      const vw = window.innerWidth || document.documentElement.clientWidth || 400;
      const main = document.querySelector('.main-area');
      const usable = Math.max(200, (main ? main.getBoundingClientRect().width : vw) - 12);
      const pxCap = Math.floor((usable - 24) / n);
      const remPx = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
      const defaultCellPx = order === 3 ? 3 * remPx : order === 4 ? 2.3 * remPx : 1.6 * remPx;
      const minCell = order === 3 ? 28 : order === 4 ? 20 : 15;
      const maxCell = order === 3 ? 52 : order === 4 ? 40 : 28;
      let cellPx;
      if (vw <= 900) {
        cellPx = Math.max(minCell, Math.min(maxCell, pxCap));
      } else {
        cellPx = Math.max(minCell, Math.min(maxCell + 12, defaultCellPx));
      }
      const cellSize = cellPx + 'px';
      const fontPx = Math.max(
        order === 5 ? 10 : 11,
        Math.min(order === 3 ? 26 : order === 4 ? 20 : 15, Math.round(cellPx * (order === 3 ? 0.5 : order === 4 ? 0.47 : 0.52)))
      );
      const fontSize = fontPx + 'px';
      return { cellSize, fontSize };
    }

    function createGrid(order) {
      lastFocusedInput = null;
      savedCellIndex = null;
      savedCellValue = '';
      const n = order * order;
      const cells = n * n;
      gridEl.innerHTML = '';
      const maxVal = MAX_VAL[order];
      const { cellSize, fontSize } = getResponsiveGridCellMetrics(order);
      gridEl.style.gridTemplateColumns = `repeat(${n}, ${cellSize})`;
      gridEl.style.gridTemplateRows = `repeat(${n}, ${cellSize})`;
      for (let i = 0; i < cells; i++) {
        const row = Math.floor(i / n);
        const col = i % n;
        const input = document.createElement('input');
        input.type = 'text';
        input.inputMode = 'numeric';
        input.maxLength = order === 3 ? 1 : 2;
        input.dataset.index = i;
        input.style.fontSize = fontSize;
        if ((col + 1) % order === 0 && col !== n - 1) input.classList.add('block-right');
        if ((row + 1) % order === 0 && row !== n - 1) input.classList.add('block-bottom');
        input.addEventListener('focus', () => {
          selectCell(input);
          if (!input.classList.contains('fixed')) {
            savedCellIndex = input.dataset.index;
            savedCellValue = input.value;
          }
        });
        input.addEventListener('click', () => selectCell(input));
        input.addEventListener('input', function() {
          if (!this.classList.contains('fixed')) {
            const idx = parseInt(this.dataset.index, 10);
            snapshotGrid(idx, savedCellValue);
            savedCellIndex = idx;
          }
          let v = this.value.replace(/\D/g, '');
          if (maxVal <= 9) {
            v = v.slice(0, 1);
            if (v === '0') v = '';
          } else {
            const num = parseInt(v, 10);
            if (num === 0) v = '';
            else if (num > maxVal) v = String(maxVal);
            else if (v.length > 2) v = v.slice(0, 2);
          }
          this.value = v;
          if (!this.classList.contains('fixed')) savedCellValue = v;
          this.classList.toggle('filled', v.trim() !== '');
          if (v) {
            const inputs = gridEl.querySelectorAll('input');
            const idx = parseInt(this.dataset.index, 10);
            for (let i = idx + 1; i < inputs.length; i++) {
              const next = inputs[i];
              if (!next.classList.contains('fixed') && !next.value.trim()) {
                next.focus();
                selectCell(next);
                break;
              }
            }
          }
          recomputeConflicts();
          checkAndShowUserSolved();
        });
        input.addEventListener('keydown', function(e) {
          if (!this.classList.contains('fixed')) {
            savedCellIndex = this.dataset.index;
            savedCellValue = this.value;
          }
          if (e.key === 'Backspace' && !this.value && this.previousElementSibling)
            this.previousElementSibling.focus();
        });
        gridEl.appendChild(input);
      }
      currentOrder = order;
      currentSizeLabel = Object.keys(SIZES).find(l => SIZES[l] === order) || '9×9';
      renderNumberPad(order);
    }

    function order4DisplayToChar(v) {
      const n = parseInt(v, 10);
      if (n >= 1 && n <= 10) return String.fromCharCode(48 + n - 1);
      if (n >= 11 && n <= 16) return String.fromCharCode(97 + n - 11);
      return '.';
    }
    function order5DisplayToChar(v) {
      const n = parseInt(v, 10);
      if (n >= 1 && n <= 25) return String.fromCharCode(97 + n - 1);
      return '.';
    }
    function order4CharToDisplay(ch) {
      if (ch === '.') return '';
      if (ch >= '0' && ch <= '9') return String(ch.charCodeAt(0) - 48 + 1);
      if (ch >= 'a' && ch <= 'f') return String(ch.charCodeAt(0) - 97 + 11);
      return '';
    }
    function order5CharToDisplay(ch) {
      if (ch === '.') return '';
      if (ch >= 'a' && ch <= 'y') return String(ch.charCodeAt(0) - 97 + 1);
      return '';
    }

    function gridToPuzzle(overrideIndex, overrideDisplayValue) {
      const inputs = gridEl.querySelectorAll('input');
      const order = currentOrder;
      const n = order * order;
      const maxVal = MAX_VAL[order];
      const out = [];
      for (let i = 0; i < inputs.length; i++) {
        const v = (overrideIndex !== undefined && overrideIndex !== null && i === parseInt(overrideIndex, 10))
          ? (overrideDisplayValue !== undefined ? String(overrideDisplayValue || '').trim() : inputs[i].value.trim())
          : inputs[i].value.trim();
        if (!v) { out.push('.'); continue; }
        if (order === 3) out.push(/^[1-9]$/.test(v) ? v : '.');
        else if (order === 4) out.push(order4DisplayToChar(v));
        else out.push(order5DisplayToChar(v));
      }
      return out.join('').slice(0, n * n);
    }

    function recomputeConflicts() {
      const inputs = Array.from(gridEl.querySelectorAll('input'));
      const order = currentOrder;
      const n = order * order;
      inputs.forEach(inp => inp.classList.remove('conflict'));

      function markConflicts(indices) {
        const seen = {};
        for (const idx of indices) {
          const v = inputs[idx].value.trim();
          if (!v) continue;
          const num = parseInt(v, 10);
          if (!num || Number.isNaN(num)) continue;
          if (!seen[num]) seen[num] = [];
          seen[num].push(idx);
        }
        Object.values(seen).forEach(list => {
          if (list.length > 1) {
            list.forEach(i => inputs[i].classList.add('conflict'));
          }
        });
      }

      // Rows
      for (let r = 0; r < n; r++) {
        const idxs = [];
        for (let c = 0; c < n; c++) idxs.push(r * n + c);
        markConflicts(idxs);
      }
      // Columns
      for (let c = 0; c < n; c++) {
        const idxs = [];
        for (let r = 0; r < n; r++) idxs.push(r * n + c);
        markConflicts(idxs);
      }
      // Sub-grids
      for (let br = 0; br < order; br++) {
        for (let bc = 0; bc < order; bc++) {
          const idxs = [];
          const rowStart = br * order;
          const colStart = bc * order;
          for (let r = 0; r < order; r++) {
            for (let c = 0; c < order; c++) {
              const rr = rowStart + r;
              const cc = colStart + c;
              idxs.push(rr * n + cc);
            }
          }
          markConflicts(idxs);
        }
      }
    }

    function checkAndShowUserSolved() {
      if (userSolveStartTime == null) return;
      if (!checkUserCompleted()) return;
      const elapsedSec = (Date.now() - userSolveStartTime) / 1000;
      clearUserSolveTimer();
      showUserSolvedMessage(elapsedSec);
    }

    function puzzleToGrid(puzzle, order, cluesPuzzle) {
      const inputs = gridEl.querySelectorAll('input');
      const n = order * order;
      const len = n * n;
      const str = String(puzzle).padEnd(len, '.').slice(0, len);
      const clues = cluesPuzzle != null ? String(cluesPuzzle).padEnd(len, '.').slice(0, len) : str;
      for (let i = 0; i < inputs.length && i < len; i++) {
        const ch = str[i];
        let disp = '';
        if (order === 3) disp = ch !== '.' && /[1-9]/.test(ch) ? ch : '';
        else if (order === 4) disp = order4CharToDisplay(ch);
        else disp = order5CharToDisplay(ch);
        inputs[i].value = disp;
        inputs[i].classList.remove('fixed', 'filled');
        const isClue = order === 3
          ? (clues[i] !== '.' && /[1-9]/.test(clues[i]))
          : order === 4
            ? (clues[i] !== '.' && order4CharToDisplay(clues[i]) !== '')
            : (clues[i] !== '.' && order5CharToDisplay(clues[i]) !== '');
        if (isClue) {
          inputs[i].classList.add('fixed');
          inputs[i].readOnly = true;
        } else {
          inputs[i].readOnly = false;
          if (disp !== '') inputs[i].classList.add('filled');
        }
      }
      recomputeConflicts();
    }

    function setSolution(puzzle, solution, order, instant) {
      // Animate construction of the solver's solution so cells fill in progressively.
      // If instant is true, fill all cells immediately (for real-time best_solution updates).
      const inputs = gridEl.querySelectorAll('input');
      const n = order * order;
      const len = n * n;
      const puz = String(puzzle).padEnd(len, '.').slice(0, len);
      const sol = String(solution).padEnd(len, '.').slice(0, len);

      const steps = [];

      for (let i = 0; i < inputs.length && i < len; i++) {
        let fixed = false;
        if (order === 3) fixed = puz[i] !== '.' && /[1-9]/.test(puz[i]);
        else if (order === 4) fixed = puz[i] !== '.' && order4CharToDisplay(puz[i]) !== '';
        else fixed = puz[i] !== '.' && order5CharToDisplay(puz[i]) !== '';

        let val = '';
        if (order === 3) val = sol[i] !== '.' && /[1-9]/.test(sol[i]) ? sol[i] : '';
        else if (order === 4) val = order4CharToDisplay(sol[i]);
        else val = order5CharToDisplay(sol[i]);

        // Fixed clues stay as-is; we only animate non-fixed cells.
        inputs[i].classList.toggle('fixed', fixed);
        inputs[i].readOnly = fixed;
        if (fixed) {
          // Ensure fixed cells show their final value immediately.
          if (!inputs[i].value) inputs[i].value = val;
          inputs[i].classList.remove('filled');
        } else {
          // Queue this non-fixed cell to be filled as part of the animation.
          inputs[i].value = '';
          inputs[i].classList.remove('filled');
          if (val) steps.push({ index: i, value: val });
        }
      }

      if (instant) {
        steps.forEach(function(s) {
          const inp = inputs[s.index];
          if (inp) { inp.value = s.value; inp.classList.add('filled'); }
        });
        recomputeConflicts();
        clearUserSolveTimer();
        return;
      }

      // Shuffle steps so cells are filled in random order.
      for (let i = steps.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [steps[i], steps[j]] = [steps[j], steps[i]];
      }

      let stepIndex = 0;
      const batchSize = 12;   // cells per frame for a faster fill
      const delayMs = 25;      // delay between frames (ms)

      function applyNextBatch() {
        if (stepIndex >= steps.length) {
          recomputeConflicts();
          clearUserSolveTimer();
          return;
        }
        for (let k = 0; k < batchSize && stepIndex < steps.length; k++, stepIndex++) {
          const { index, value } = steps[stepIndex];
          const inp = inputs[index];
          if (!inp) continue;
          inp.value = value;
          inp.classList.add('filled');
        }
        recomputeConflicts();
        setTimeout(applyNextBatch, delayMs);
      }

      applyNextBatch();
    }

    function showResult(obj, isError) {
      resultEl.style.display = 'block';
      resultEl.classList.toggle('error', isError);
      if (isError) {
        resultEl.innerHTML = '<strong>Error</strong>: ' + (obj.error || 'Unknown error');
        return;
      }
      let html = '';
      if (obj.success) {
        html += '<span class="time">Solved in ' + (obj.time != null ? obj.time.toFixed(2) : '?') + ' s</span>';
        if (obj.iterations != null) html += '<div class="meta">Iterations: ' + obj.iterations + '</div>';
        if (obj.communication != null) html += '<div class="meta">Communication: ' + (obj.communication ? 'yes' : 'no') + '</div>';
      } else {
        html += 'No solution within timeout' + (obj.time != null ? ' (' + obj.time.toFixed(2) + ' s)' : '') + '.';
        if (obj.iterations != null) html += '<div class="meta">Iterations: ' + obj.iterations + '</div>';
      }
      resultEl.innerHTML = html;
    }

    function refreshLibraryList() {
      const size = sizeSelect.value;
      const list = libraryData[size] || [];
      libraryList.innerHTML = '';
      list.forEach((item, idx) => {
        const li = document.createElement('li');
        li.textContent = item.name;
        li.dataset.path = item.path;
        li.dataset.index = idx;
        li.addEventListener('click', () => {
          libraryList.querySelectorAll('li').forEach(l => l.classList.remove('selected'));
          li.classList.add('selected');
        });
        libraryList.appendChild(li);
      });
      if (!list.length) {
        const li = document.createElement('li');
        li.textContent = '(no instances for this size)';
        li.style.pointerEvents = 'none';
        li.style.opacity = '0.7';
        libraryList.appendChild(li);
      }
    }

    async function loadLibrary() {
      try {
        const r = await fetch('/api/library');
        libraryData = await r.json();
        refreshLibraryList();
      } catch (e) {
        libraryList.innerHTML = '<li style="color:#f7768e">Failed to load library</li>';
      }
    }

    sizeSelect.addEventListener('change', () => {
      applyTimeoutForSizeLabel(sizeSelect.value);
      const newOrder = SIZES[sizeSelect.value];
      if (newOrder !== currentOrder) {
        currentOrder = newOrder;
        currentSizeLabel = sizeSelect.value;
        createGrid(currentOrder);
        const len = CELLS[currentOrder];
        initialPuzzle = '.'.repeat(len);
        puzzleToGrid(initialPuzzle, currentOrder, initialPuzzle);
        currentPuzzleName = 'Empty grid';
        updateSubtitle();
        resultEl.style.display = 'none';
        updateSolveButton();
      }
      refreshLibraryList();
    });

    loadBtn.addEventListener('click', async () => {
      const sel = libraryList.querySelector('li.selected');
      if (!sel || !sel.dataset.path) return;
      const path = sel.dataset.path;
      try {
        snapshotGrid();
        const r = await fetch('/api/instance/' + encodeURIComponent(path));
        if (!r.ok) { const d = await r.json().catch(() => ({})); showResult(d, true); return; }
        const data = await r.json();
        const order = data.order;
        const puzzle = data.puzzle;
        createGrid(order);
        sizeSelect.value = order === 3 ? '9×9' : order === 4 ? '16×16' : '25×25';
        applyTimeoutForSizeLabel(sizeSelect.value);
        initialPuzzle = puzzle;
        puzzleToGrid(puzzle, order, puzzle);
        currentPuzzleName = path.split('/').pop() || path;
        resultEl.style.display = 'none';
        startUserSolveTimer();
        updateSolveButton();
        updateSubtitle();
      } catch (e) {
        showResult({ error: e.message || 'Load failed' }, true);
      }
    });

    let solving = false;

    let _resizeLayoutTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(_resizeLayoutTimer);
      _resizeLayoutTimer = setTimeout(() => {
        if (solving) return;
        try {
          const puzzle = gridToPuzzle();
          const ord = currentOrder;
          const init = initialPuzzle;
          createGrid(ord);
          puzzleToGrid(puzzle, ord, init);
          recomputeConflicts();
        } catch (_) {}
      }, 250);
    });

    function initResponsiveSidePanel() {
      const panel = document.getElementById('sidePanelDetails');
      if (!panel) return;
      const mq = window.matchMedia('(max-width: 900px)');
      const sync = () => { panel.open = !mq.matches; };
      if (typeof mq.addEventListener === 'function') mq.addEventListener('change', sync);
      else if (typeof mq.addListener === 'function') mq.addListener(sync);
      sync();
    }

    function updateSolveButton() {
      if (solving) return;
      const puzzle = gridToPuzzle();
      const hasEmpty = puzzle.includes('.');
      solveBtn.disabled = !hasEmpty;
      solveBtn.title = !hasEmpty ? 'Grid is already full' : 'Solve the puzzle';
    }

    gridEl.addEventListener('input', updateSolveButton);
    gridEl.addEventListener('change', updateSolveButton);

    solveBtn.addEventListener('click', async () => {
      const puzzle = gridToPuzzle();
      if (!puzzle.includes('.')) {
        showResult({ error: 'Grid is already full' }, true);
        return;
      }

      const evapVal = parseFloat(document.getElementById('evap').value);
      if (isNaN(evapVal) || evapVal <= 0 || evapVal >= 1) {
        alert("Invalid ρ_BVE (--evap): use a value strictly between 0 and 1.");
        return;
      }

      snapshotGrid();
      if (solverProgressEl) solverProgressEl.textContent = '';
      solving = true;
      solveBtn.disabled = true;
      resultEl.style.display = 'block';
      resultEl.classList.remove('error');
      resultEl.innerHTML = 'Solving…';
      resultEl.classList.add('loading');
      try {
        const timeout = parseInt(document.getElementById('timeout').value, 10) || TIMEOUT_BY_SIZE[sizeSelect.value] || 5;
        const timeoutMs = (timeout + 20) * 1000;
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeoutMs);
        let postRes, postData;
        try {
          postRes = await fetch('/api/solve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              puzzle,
              timeout,
              threads: parseInt(document.getElementById('threads').value, 10) || 5,
              ants: parseInt(document.getElementById('ants').value, 10) || 3,
              numacs: parseInt(document.getElementById('numacs').value, 10) || 2,
              q0: parseFloat(document.getElementById('q0').value) || 0.9,
              rho: parseFloat(document.getElementById('rho').value) || 0.9,
              xi: parseFloat(document.getElementById('xi').value) || 0.1,
              evap: parseFloat(document.getElementById('evap').value) || 0.005,
              convthreshold: parseFloat(document.getElementById('convthreshold').value) || 0.8,
              entropythreshold: parseFloat(document.getElementById('entropythreshold').value) || entropyThresholdFromAnts(parseInt(document.getElementById('ants').value, 10) || 3),
              commThreshold: parseInt(document.getElementById('commThreshold').value, 10) || 200,
              commEarly: parseInt(document.getElementById('commEarly').value, 10) || 100,
              commLate: parseInt(document.getElementById('commLate').value, 10) || 10,
              alg: parseInt(algSelect.value, 10),
              order: currentOrder
            }),
            signal: controller.signal
          });
          const text = await postRes.text();
          try {
            postData = text ? JSON.parse(text) : {};
          } catch (_) {
            resultEl.classList.remove('loading');
            showResult({ error: 'Server returned invalid response. Is the app running?' }, true);
            return;
          }
        } finally {
          clearTimeout(id);
        }
        if (!postRes.ok) {
          resultEl.classList.remove('loading');
          showResult(postData && postData.error ? postData : { error: 'Server error ' + postRes.status }, true);
          return;
        }
        // Support both APIs: direct result (200) or job_id + polling (202)
        if (postData.job_id) {
          const jobId = postData.job_id;
          const pollUntilDone = () => new Promise((resolve, reject) => {
            const deadline = Date.now() + timeoutMs;
            const poll = async () => {
              try {
                if (Date.now() > deadline) {
                  reject(new Error('Request timed out'));
                  return;
                }
                const r = await fetch('/api/status/' + encodeURIComponent(jobId), { signal: controller.signal });
                const text = await r.text();
                let data = {};
                try { data = text ? JSON.parse(text) : {}; } catch (_) {}
                if (!r.ok || data.error) {
                  resolve({ status: 'error', result: { error: data.error || ('Status ' + r.status) } });
                  return;
                }
                if (data.status === 'done' || data.status === 'error') {
                  resolve(data);
                  return;
                }
                if (data.progress && solverProgressEl) {
                  const p = data.progress;
                  solverProgressEl.textContent = 'Iteration ' + p.iteration + ' — best-so-far ' + p.filled + ' / ' + p.total + ' cells';
                }
                if (data.best_solution) setSolution(puzzle, data.best_solution, currentOrder, true);
                setTimeout(poll, 150);
              } catch (e) {
                reject(e);
              }
            };
            poll();
          });
          const statusData = await pollUntilDone();
          resultEl.classList.remove('loading');
          if (solverProgressEl && statusData.progress) {
            const p = statusData.progress;
            solverProgressEl.textContent = 'Iteration ' + p.iteration + ' — best-so-far ' + p.filled + ' / ' + p.total + ' cells';
          }
          const res = statusData.result || {};
          if (statusData.status === 'error' && res.error) {
            showResult(res, true);
          } else {
            showResult(res, !!res.error);
            if (res.success && res.solution) setSolution(puzzle, res.solution, currentOrder, false);
          }
        } else {
          resultEl.classList.remove('loading');
          showResult(postData, !!postData.error);
          if (postData.success && postData.solution) setSolution(puzzle, postData.solution, currentOrder, false);
        }
      } catch (e) {
        resultEl.classList.remove('loading');
        const msg = e.name === 'AbortError' ? 'Request timed out' : (e.message || 'Network error');
        showResult({ error: msg }, true);
      } finally {
        solving = false;
        updateSolveButton();
      }
    });

    clearBtn.addEventListener('click', () => {
      const len = CELLS[currentOrder] || 81;
      snapshotGrid();
      initialPuzzle = '.'.repeat(len);
      puzzleToGrid(initialPuzzle, currentOrder, initialPuzzle);
      currentPuzzleName = 'Empty grid';
      resultEl.style.display = 'none';
      clearUserSolveTimer();
      updateSolveButton();
      updateSubtitle();
    });

    (function init() {
      const params = new URLSearchParams(window.location.search);
      const sizeParam = (params.get('size') || '').toLowerCase();
      const sizeMap = { '9x9': '9×9', '16x16': '16×16', '25x25': '25×25' };
      const initialSize = sizeMap[sizeParam] || '9×9';
      const initialOrder = SIZES[initialSize] || 3;

      createGrid(initialOrder);
      sizeSelect.value = initialSize;
      applyTimeoutForSizeLabel(initialSize);
      applyEntropyThresholdFromAnts();
      updateSolveButton();
      updateUndoButton();

      const created = sessionStorage.getItem('createdPuzzle');
      if (created) {
        try {
          const data = JSON.parse(created);
          const { order, puzzle } = data;
          sessionStorage.removeItem('createdPuzzle');
          if (order && puzzle && [3, 4, 5].includes(order)) {
            createGrid(order);
            sizeSelect.value = order === 3 ? '9×9' : order === 4 ? '16×16' : '25×25';
            applyTimeoutForSizeLabel(sizeSelect.value);
            initialPuzzle = puzzle;
            puzzleToGrid(puzzle, order, puzzle);
            currentPuzzleName = data.name || (data.filename) || 'Created puzzle';
            startUserSolveTimer();
            loadLibrary();
            updateSubtitle();
            return;
          }
        } catch (_) {}
      }

      if (initialSize === '9×9') {
        initialPuzzle = '5.....89..3....2.......23..1.3....6......6738...9.5..2.....9523..5....79.......8.';
        puzzleToGrid(initialPuzzle, 3, initialPuzzle);
        currentPuzzleName = 'Default puzzle';
        startUserSolveTimer();
      } else {
        const len = CELLS[initialOrder] || 81;
        initialPuzzle = '.'.repeat(len);
        puzzleToGrid(initialPuzzle, initialOrder, initialPuzzle);
        currentPuzzleName = 'Empty grid';
      }
      updateSubtitle();
      loadLibrary();
      initResponsiveSidePanel();
    })();
  </script>
</body>
</html>
