<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SudoPHASE – Create Puzzle</title>
  <style>
    :root {
      /* Dark theme (default) */
      --bg: #1a1b26;
      --surface: #24283b;
      --text: #c0caf5;
      --accent: #7aa2f7;
      --success: #9ece6a;
      --border: #3b4261;
      --cell-border: #414868;
      --block-border: #7aa2f7;
    }
    :root[data-theme="light"] {
      /* Light theme */
      --bg: #f5f7ff;
      --surface: #ffffff;
      --text: #1f2335;
      --accent: #3366ff;
      --success: #2e7d32;
      --border: #c5cee0;
      --cell-border: #d0d7ea;
      --block-border: #3366ff;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; padding: max(1.25rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left)); width: 100%; }
    .back { color: var(--accent); font-size: 0.9rem; text-decoration: none; align-self: flex-start; margin-bottom: 0.5rem; }
    h1 { font-size: 1.4rem; color: var(--accent); margin-bottom: 0.5rem; }
    .step { margin-bottom: 1.5rem; text-align: center; }
    .size-btns { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .size-btns button { padding: 0.6rem 1.2rem; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); color: var(--text); cursor: pointer; font-weight: 600; }
    .size-btns button:hover, .size-btns button.selected {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--bg);
    }
    .grid-wrap { padding: 0.5rem; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); margin: 1rem 0; }
    .sudoku-grid { display: grid; gap: 0; border: 4px solid var(--block-border); }
    .sudoku-grid input { border: 1px solid var(--cell-border); background: var(--bg); color: var(--text); text-align: center; padding: 0; font-size: 1rem; }
    .sudoku-grid input.block-right { border-right-width: 3px; border-right-color: var(--block-border); }
    .sudoku-grid input.block-bottom { border-bottom-width: 3px; border-bottom-color: var(--block-border); }
    .number-pad { display: grid; grid-template-columns: repeat(auto-fit, minmax(2.5rem, 1fr)); gap: 0.4rem; max-width: 320px; margin: 1rem auto; }
    .number-pad button { padding: 0.4rem; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-weight: 600; cursor: pointer; }
    .number-pad button:hover { border-color: var(--accent); }
    .actions { margin-top: 1rem; display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .actions button, .actions a { padding: 0.6rem 1.25rem; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; border: none; font-size: 1rem; }
    .btn-play { background: var(--accent); color: var(--bg); }
    .btn-play:hover { filter: brightness(1.1); }
    .btn-play:disabled { opacity: 0.6; cursor: not-allowed; }
    .create-area { display: none; }
    .create-area.visible { display: block; }
    button, a, input { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

    .theme-toggle {
      position: fixed;
      top: max(0.75rem, env(safe-area-inset-top));
      right: max(0.75rem, env(safe-area-inset-right));
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    .theme-toggle:hover { filter: brightness(1.1); }

    @media (max-width: 480px) {
      h1 { font-size: 1.2rem; }
      .grid-wrap { max-width: 100%; overflow-x: auto; }
      .size-btns button { min-height: 44px; }
      .actions button, .actions a { min-height: 44px; width: 100%; max-width: 280px; }
    }
  </style>
</head>
<body>
  <button type="button" id="themeToggle" class="theme-toggle">Light theme</button>
  <a href="/" class="back">← Main menu</a>
  <h1>Create Puzzle</h1>
  <div class="step">
    <p style="margin-bottom:0.5rem;">Choose size:</p>
    <div class="size-btns">
      <button type="button" data-size="9×9" data-order="3">9×9</button>
      <button type="button" data-size="16×16" data-order="4">16×16</button>
      <button type="button" data-size="25×25" data-order="5">25×25</button>
    </div>
  </div>
  <div class="create-area" id="createArea">
    <p class="subtitle" id="createSubtitle" style="font-size:0.9rem;opacity:0.9;margin-bottom:0.5rem;">Fill in the clues (empty cells will be for the player to solve).</p>
    <div class="grid-wrap">
      <div class="sudoku-grid" id="grid"></div>
    </div>
    <div class="number-pad" id="numberPad"></div>
    <div class="actions">
      <button type="button" class="btn-play" id="playBtn">Play this puzzle</button>
    </div>
  </div>

  <script>
    const THEME_KEY = 'sudophaseTheme';

    function applyTheme(theme) {
      if (theme !== 'light' && theme !== 'dark') theme = 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      const btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = theme === 'dark' ? 'Light theme' : 'Dark theme';
    }

    function initThemeToggle() {
      const stored = localStorage.getItem(THEME_KEY) || 'dark';
      applyTheme(stored);
      const btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        const next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem(THEME_KEY, next);
        applyTheme(next);
      });
    }

    initThemeToggle();

    const gridEl = document.getElementById('grid');
    const numberPad = document.getElementById('numberPad');
    const createArea = document.getElementById('createArea');
    const playBtn = document.getElementById('playBtn');
    const sizeBtns = document.querySelectorAll('.size-btns button');

    const SIZES = { '9×9': 3, '16×16': 4, '25×25': 5 };
    const CELLS = { 3: 81, 4: 256, 5: 625 };
    const MAX_VAL = { 3: 9, 4: 16, 5: 25 };
    let currentOrder = 3;
    let currentSizeLabel = '9×9';
    let lastFocusedInput = null;

    function order4DisplayToChar(v) {
      const n = parseInt(v, 10);
      if (n >= 1 && n <= 10) return String.fromCharCode(48 + n - 1);
      if (n >= 11 && n <= 16) return String.fromCharCode(97 + n - 11);
      return '.';
    }
    function order5DisplayToChar(v) {
      const n = parseInt(v, 10);
      if (n >= 1 && n <= 25) return String.fromCharCode(97 + n - 1);
      return '.';
    }
    function order4CharToDisplay(ch) {
      if (ch === '.') return ''; if (ch >= '0' && ch <= '9') return String(ch.charCodeAt(0) - 48 + 1);
      if (ch >= 'a' && ch <= 'f') return String(ch.charCodeAt(0) - 97 + 11); return '';
    }
    function order5CharToDisplay(ch) {
      if (ch === '.') return ''; if (ch >= 'a' && ch <= 'y') return String(ch.charCodeAt(0) - 97 + 1); return '';
    }

    function gridToPuzzle() {
      const inputs = gridEl.querySelectorAll('input');
      const order = currentOrder;
      const n = order * order;
      const out = [];
      for (let i = 0; i < inputs.length; i++) {
        const v = inputs[i].value.trim();
        if (!v) { out.push('.'); continue; }
        if (order === 3) out.push(/^[1-9]$/.test(v) ? v : '.');
        else if (order === 4) out.push(order4DisplayToChar(v));
        else out.push(order5DisplayToChar(v));
      }
      return out.join('').slice(0, n * n);
    }

    function puzzleToGrid(puzzle, order) {
      const inputs = gridEl.querySelectorAll('input');
      const n = order * order;
      const len = n * n;
      const str = String(puzzle).padEnd(len, '.').slice(0, len);
      for (let i = 0; i < inputs.length && i < len; i++) {
        const ch = str[i];
        let disp = '';
        if (order === 3) disp = ch !== '.' && /[1-9]/.test(ch) ? ch : '';
        else if (order === 4) disp = order4CharToDisplay(ch);
        else disp = order5CharToDisplay(ch);
        inputs[i].value = disp;
      }
    }

    function renderNumberPad(order) {
      numberPad.innerHTML = '';
      const maxVal = MAX_VAL[order];
      for (let v = 1; v <= maxVal; v++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = String(v);
        btn.addEventListener('click', () => {
          let target = lastFocusedInput || gridEl.querySelector('input');
          if (target) { target.value = String(v); target.focus(); }
        });
        numberPad.appendChild(btn);
      }
      const delBtn = document.createElement('button');
      delBtn.type = 'button';
      delBtn.textContent = 'Del';
      delBtn.addEventListener('click', () => {
        const target = lastFocusedInput || gridEl.querySelector('input');
        if (target) { target.value = ''; target.focus(); }
      });
      numberPad.appendChild(delBtn);
    }

    function createGrid(order) {
      const n = order * order;
      const cells = n * n;
      gridEl.innerHTML = '';
      const maxVal = MAX_VAL[order];
      const cellSize = order === 3 ? '3rem' : order === 4 ? '2.3rem' : '1.6rem';
      const fontSize = order === 3 ? '1.2rem' : order === 4 ? '0.9rem' : '0.7rem';
      gridEl.style.gridTemplateColumns = `repeat(${n}, ${cellSize})`;
      gridEl.style.gridTemplateRows = `repeat(${n}, ${cellSize})`;
      for (let i = 0; i < cells; i++) {
        const row = Math.floor(i / n);
        const col = i % n;
        const input = document.createElement('input');
        input.type = 'text';
        input.inputMode = 'numeric';
        input.maxLength = order === 3 ? 1 : 2;
        input.dataset.index = i;
        input.style.fontSize = fontSize;
        if ((col + 1) % order === 0 && col !== n - 1) input.classList.add('block-right');
        if ((row + 1) % order === 0 && row !== n - 1) input.classList.add('block-bottom');
        input.addEventListener('focus', () => { lastFocusedInput = input; });
        input.addEventListener('click', () => { lastFocusedInput = input; });
        input.addEventListener('input', function() {
          let v = this.value.replace(/\D/g, '');
          if (maxVal <= 9) v = v.slice(0, 1);
          else { const num = parseInt(v, 10); if (num > maxVal) v = String(maxVal); else if (v.length > 2) v = v.slice(0, 2); }
          this.value = v;
        });
        gridEl.appendChild(input);
      }
      currentOrder = order;
      currentSizeLabel = order === 3 ? '9×9' : order === 4 ? '16×16' : '25×25';
      renderNumberPad(order);
    }

    sizeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        sizeBtns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        const order = parseInt(btn.dataset.order, 10);
        createGrid(order);
        const len = CELLS[order];
        puzzleToGrid('.'.repeat(len), order);
        createArea.classList.add('visible');
      });
    });

    playBtn.addEventListener('click', () => {
      const puzzle = gridToPuzzle();
      const order = currentOrder;
      const sizeKey = order === 3 ? '9x9' : order === 4 ? '16x16' : '25x25';
      sessionStorage.setItem('createdPuzzle', JSON.stringify({ order, puzzle }));
      window.location.href = '/play?size=' + sizeKey;
    });
  </script>
</body>
</html>
